# AI Model Definitions for Discord Support Bot
# Defines all supported models, their capabilities, costs, and provider mappings

# Model categories for routing
model_categories:
  free:
    description: "Free or very low cost models for high volume"
  budget:
    description: "Cost-effective models for standard queries"
  standard:
    description: "High quality models for complex queries"
  premium:
    description: "Top-tier models for critical escalations"
  vision:
    description: "Models supporting image understanding"
  code:
    description: "Models optimized for code generation"

# Provider configurations
providers:
  openai:
    name: "OpenAI"
    base_url: "https://api.openai.com/v1"
    default_timeout: 60
    retry_attempts: 3
    supports_streaming: true
    
  anthropic:
    name: "Anthropic"
    base_url: "https://api.anthropic.com"
    default_timeout: 120
    retry_attempts: 3
    supports_streaming: true
    
  openrouter:
    name: "OpenRouter"
    base_url: "https://openrouter.ai/api/v1"
    default_timeout: 120
    retry_attempts: 3
    supports_streaming: true
    
  groq:
    name: "Groq"
    base_url: "https://api.groq.com/openai/v1"
    default_timeout: 30
    retry_attempts: 3
    supports_streaming: true
    rate_limits:
      requests_per_minute: 30000
      tokens_per_minute: 1000000
      
  ollama_cloud:
    name: "Ollama Cloud"
    base_url: "https://api.ollama.com/v1"
    default_timeout: 60
    retry_attempts: 2
    supports_streaming: true

# Model definitions
models:
  # ============================================
  # OpenAI Models
  # ============================================
  
  gpt-4o:
    provider: "openai"
    name: "GPT-4o"
    description: "OpenAI's most capable multimodal model"
    categories: ["premium", "vision"]
    capabilities:
      chat: true
      vision: true
      function_calling: true
      json_mode: true
      streaming: true
      system_prompt: true
    context_length: 128000
    max_output_tokens: 4096
    cost_per_1m_tokens:
      input: 2.50
      output: 10.00
      cached_input: 1.25
    training_cutoff: "2023-10"
    aliases: ["gpt-4o-latest"]
    
  gpt-4o-mini:
    provider: "openai"
    name: "GPT-4o Mini"
    description: "Fast, affordable small model for focused tasks"
    categories: ["budget", "vision"]
    capabilities:
