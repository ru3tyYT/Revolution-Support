apiVersion: v1
kind: Service
metadata:
  name: discord-bot-service
  namespace: supportbot
  labels:
    app: discord-bot
    component: bot
spec:
  selector:
    app: discord-bot
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: discord-bot
  namespace: supportbot
  labels:
    app: discord-bot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: discord-bot-role
  namespace: supportbot
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: discord-bot-rolebinding
  namespace: supportbot
subjects:
- kind: ServiceAccount
  name: discord-bot
  namespace: supportbot
roleRef:
  kind: Role
  name: discord-bot-role
  apiGroup: rbac.authorization.k8s.io
