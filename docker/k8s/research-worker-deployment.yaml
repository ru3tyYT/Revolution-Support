apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-worker
  namespace: supportbot
  labels:
    app: research-worker
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: research-worker
  template:
    metadata:
      labels:
        app: research-worker
        component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      containers:
      - name: worker
        image: discord-support-bot:latest
        imagePullPolicy: Always
        command:
        - celery
        - -A
        - src.tasks
        - worker
        - --loglevel=info
        - --concurrency=4
        - --prefetch-multiplier=1
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: discord-bot-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
        - name: CELERY_BROKER_URL
          value: "redis://redis-service:6379/1"
        - name: CELERY_RESULT_BACKEND
          value: "redis://redis-service:6379/2"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: discord-bot-secrets
              key: openai-api-key
        - name: SERPAPI_KEY
          valueFrom:
            secretKeyRef:
              name: discord-bot-secrets
              key: serpapi-key
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: discord-bot-config
              key: log-level
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - celery
            - -A
            - src.tasks
            - inspect
            - ping
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: research-worker-hpa
  namespace: supportbot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: research-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: External
    external:
      metric:
        name: celery_queue_length
      target:
        type: Value
        value: "10"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
