[alembic]
# Path to migration scripts
script_location = database/migrations

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# The version_locations parameter takes precedence over file_template
# when it comes to determining where to write version files.
# version_locations = %(here)s/versions

# The default encoding for the migration files is utf-8
# file_template can include '%%' characters, which will be replaced
# with a percentage sign in the final output.

# The output encoding used when revision files are written from
# script.py.mako
output_encoding = utf-8

sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/discord_support_bot


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# Format using "black" - use the console_scripts runner, against the entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
